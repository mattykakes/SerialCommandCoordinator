name: Multi-Platform CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- STAGE 1: COMPILATION ---
  compile_test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Arduino-Uno"
            board: "arduino:avr:uno"
            platform: "arduino:avr"
            board_type: "uno"
          - name: "Arduino-Mega-2560"
            board: "arduino:avr:mega"
            platform: "arduino:avr"
            board_type: "mega"
          - name: "ESP32-Dev-Module"
            board: "esp32:esp32:esp32"
            platform: "esp32:esp32"
            index_url: "https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json"
            board_type: "esp32"
          - name: "Arduino-Zero"
            board: "arduino:samd:arduino_zero_native"
            platform: "arduino:samd"
            board_type: "samd21"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino Platforms
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15/packages
            ~/.arduino15/staging
          # The cache key hashes the YAML file. 
          # If the matrix changes or a new board is added, the cache automatically resets.
          key: ${{ runner.os }}-arduino-${{ hashFiles('.github/workflows/multi-platform-ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-arduino-

      - name: Install Platforms
        run: |
          if [ ! -z "${{ matrix.index_url }}" ]; then
            arduino-cli core update-index --additional-urls ${{ matrix.index_url }}
            arduino-cli core install ${{ matrix.platform }} --additional-urls ${{ matrix.index_url }}
          else
            arduino-cli core install ${{ matrix.platform }}
          fi

      - name: Compile and Stage Binaries
        run: |
          mkdir -p ./artifacts/${{ matrix.name }}
          
          # Target the integration tests instead of the example
          arduino-cli compile --library . \
            -b ${{ matrix.board }} \
            tests/integration/integration.ino \
            --output-dir ./artifacts/${{ matrix.name }} \
            --export-binaries # This is critical for ESP32/SAMD bootability

      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          # Naming the artifact clearly as an integration test binary
          name: test-binaries-${{ matrix.name }}-${{ github.run_id }}
          path: ./artifacts/${{ matrix.name }}/
          retention-days: 1

  # --- STAGE 2: INTEGRATION ---
  integration_test:
    needs: compile_test 
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Arduino-Uno"
            board_type: "uno"
            sim_tool: "simavr"
            mcu: "atmega328p"
            simulate: true
          - name: "Arduino-Mega-2560"
            board_type: "mega"
            sim_tool: "simavr"
            mcu: "atmega2560"
            simulate: true
          - name: "ESP32-Dev-Module"
            board_type: "esp32"
            simulate: true
          - name: "Arduino-Zero"
            board_type: "samd21"
            sim_tool: "qemu"
            mcu: "cortex-m0"
            simulate: true
    
    steps:
      - name: Checkout Code
        if: ${{ matrix.simulate }}
        uses: actions/checkout@v4

      - name: Download Binary for Simulation
        if: ${{ matrix.simulate }}
        uses: actions/download-artifact@v4
        with:
          name: test-binaries-${{ matrix.name }}-${{ github.run_id }}
          path: ./sim-build

      - name: Install Emulator & Dependencies
        if: ${{ matrix.simulate }}
        run: |
          sudo apt-get update
          # Install PyYAML for the python runner
          python3 -m pip install pyyaml 
          
          if [ "${{ matrix.sim_tool }}" == "simavr" ]; then
            sudo apt-get install -y simavr socat
          elif [ "${{ matrix.sim_tool }}" == "qemu" ]; then
            sudo apt-get install -y qemu-system-arm
          fi

      - name: Run Architecture Simulation
        if: ${{ matrix.simulate }}
        run: |
          # Launch emulator, binding virtual UART to TCP port 1234
          if [ "${{ matrix.sim_tool }}" == "simavr" ]; then
            # simavr doesn't natively expose TCP easily, so we use socat to bridge its PTY to TCP port 1234
            simavr -m ${{ matrix.mcu }} -f 16000000 ./sim-build/integration.ino.elf > /tmp/simavr.log 2>&1 &
            sleep 2
            # simavr creates /tmp/simavr-uart0. We bridge it.
            socat tcp-listen:1234,reuseaddr,fork pty,link=/tmp/simavr-uart0,raw,echo=0 &
            SIM_PID=$!
            
          elif [ "${{ matrix.sim_tool }}" == "qemu" ]; then
            # QEMU natively supports bridging serial to a TCP socket
            qemu-system-arm -machine microbit -nographic \
              -kernel ./sim-build/integration.ino.elf \
              -serial tcp:127.0.0.1:1234,server,nowait &
            SIM_PID=$!
          fi
          
          sleep 2 # Let the socket open
          
          # Run the Python YAML parser against port 1234
          python3 tests/integration/yaml_runner.py --yaml universal_test.yaml --port 1234
          
          kill $SIM_PID