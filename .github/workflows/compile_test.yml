name: Multi-Platform CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Prevents multiple runs from clashing; cancels in-progress runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Arduino Uno (ATmega328P)"
            board: "arduino:avr:uno"
            platform: "arduino:avr"
          - name: "Arduino Mega 2560"
            board: "arduino:avr:mega"
            platform: "arduino:avr"
          - name: "ESP32 Dev Module"
            board: "esp32:esp32:esp32"
            platform: "esp32:esp32"
            index_url: "https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json"
          - name: "Arduino Zero (SAMD21)"
            board: "arduino:samd:arduino_zero_native"
            platform: "arduino:samd"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install Platforms
        run: |
          if [ ! -z "${{ matrix.index_url }}" ]; then
            arduino-cli core update-index --additional-urls ${{ matrix.index_url }}
            arduino-cli core install ${{ matrix.platform }} --additional-urls ${{ matrix.index_url }}
          else
            arduino-cli core install ${{ matrix.platform }}
          fi

      - name: Compile Examples
        run: |
          # This loops through every .ino file in your examples folder
          for example in examples/*/*.ino; do
            echo "Compiling $example for ${{ matrix.name }}..."
            arduino-cli compile --library . -b ${{ matrix.board }} "$example"
          done
